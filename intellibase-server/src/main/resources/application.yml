server:
  port: 8080

spring:
  application:
    name: intellibase-server
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: jdbc:postgresql://localhost:5432/intellibase
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: redis

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: guest

jwt:
  secret: Y2hhbmdlLXRoaXMtdG8tYS1sb25nLXNlY3VyZS1rZXktaW4tcHJvZHVjdGlvbi0yMDI2
  expiration: 86400000  # 24 hours in milliseconds

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

llm:
  api-key: ${OPENAI_API_KEY}
  base-url: ${OPENAI_BASE_URL}
  model-name: ${LLM_MODEL_NAME}
  temperature: 0.7
  max-tokens: 32768

rag:
  retrieval-top-k: 5
  similarity-threshold: 0.4
  cache-similarity-threshold: 0.95
  l0-local-cache-ttl-minutes: 10      # L0 JVM 本地缓存 TTL（分钟）
  l0-local-cache-max-size: 1000       # L0 本地缓存最大条目数
  l2-retrieval-cache-ttl-minutes: 30
  l3-chunk-cache-ttl-hours: 2

embedding:
  api-key: ${OPENAI_API_KEY}
  base-url: ${OPENAI_BASE_URL}
  model-name: text-embedding-v4
  dimensions: 1536

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: intellibase

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  health:
    redis:
      enabled: true
    rabbit:
      enabled: true
    db:
      enabled: true
